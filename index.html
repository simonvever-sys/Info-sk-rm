<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plushusen Introskærm</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f2f6ff 0%, #e4ecff 100%);
        color: #0f172a;
      }

      main {
        width: min(680px, 92vw);
        background: #fff;
        border-radius: 16px;
        padding: 1.25rem;
        box-shadow: 0 16px 40px rgba(17, 24, 39, 0.12);
      }

      h1 {
        margin: 0 0 0.4rem;
      }

      p {
        margin: 0 0 1rem;
        color: #334155;
      }

      .links {
        display: grid;
        gap: 0.7rem;
      }

      a {
        display: block;
        text-decoration: none;
        background: #0f172a;
        color: #fff;
        padding: 0.85rem 1rem;
        border-radius: 10px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Plushusen Introskærm</h1>
      <p>Vælg hvilken visning du vil åbne:</p>
      <div class="links">
        <a href="./tv/">Åbn TV visning</a>
        <a href="./controller/">Åbn kontrolpanel</a>
      </div>
    </main>
  </body>
</html>
